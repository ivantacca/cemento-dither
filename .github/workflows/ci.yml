name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Check committed dist/ is up to date
        run: git diff --exit-code -- dist || (echo "dist/ is stale — run 'npm run build' and commit the result" && exit 1)
      - run: npm test
